<!--
Carta de cumpleaños para Gaby

Hola, Gaby.
La verdad es que no creo que estés viendo esto,
pero me gusta la idea de que estas palabras vivan escondidas
dentro de este archivo, como un pequeño secreto del corazón.

No sé cómo entraste en mi vida,
ni en qué momento tu sonrisa comenzó a acompañarme
en cada instante del día y también en la noche.
No entiendo cómo caí en esta dulce locura por tu causa,
ni en qué momento empecé a enamorarme de ti,
no por cómo te ves, sino por quién eres.

No sé cómo decirte que me gustas.
Ahora cada canción que escucho parece hablar de ti.
Te escucho en todas partes:
en el ruido del caos y en el silencio de la tranquilidad.

Y por las noches…
no solo te veo en mis sueños,
te siento.
Mi mente te dibuja con una claridad que asusta,
como si mi corazón se negara a descansar sin imaginarte.

Tu sonrisa se ha convertido en mi luz,
esa que ilumina mis pensamientos incluso en la oscuridad.
Es increíble cómo lograste ser mi delirio,
mi locura más intensa y mi calma más profunda.
Cómo te convertiste en mi martirio,
porque duele quererte en silencio,
y al mismo tiempo en mi alegría,
porque pensarte me salva el día.

En mis sueños no solo apareces,
te quedas.
Y despierto con esa sensación de haberte tenido tan cerca,
que por un momento creo que mi corazón no distingue
entre lo que imagina y lo que anhela.

La verdad es que me tienes loco,
y aún no sé cómo decirte lo que siento.
Solo espero que algún día pueda amarte,
escucharte, consolarte
y acompañarte en cualquier locura que la vida nos regale.

Cada vez que le rezo a Dios,
le pido que, si está en sus planes,
nuestros caminos puedan unirse algún día.
Pero más que nada,
le pido que se haga su voluntad en tu vida,
porque lo único que quiero, con todo mi amor,
es lo mejor para ti.

Y si en sus planes no estoy yo,
entonces solo le pido fuerzas para aceptarlo,
para entenderlo sin rencor,
y seguir deseando tu felicidad desde donde me toque estar.
Porque amarte también significa
querer verte plena, en paz y feliz,
aunque el destino no me regale el privilegio
de caminar a tu lado.

Pero pase lo que pase,
siempre te seguiré amando.
Porque cuando el amor es verdadero,
no depende de circunstancias ni de distancias.
Mi amor por ti no necesita condiciones,
solo necesita existir.
Y dondequiera que la vida me lleve,
una parte de mi corazón siempre será tuya,
porque amaré tu esencia,
hoy y siempre.

Siempre tuyo,
tu loco enamorado,
Pablo :)
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel de Cumpleaños</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #fff9f9 0%, #ffe4e9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* --- SECCIÓN DEL PASTEL --- */
        .cake-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 30px;
        }

        /* --- TEXTO PRINCIPAL CORREGIDO Y CENTRADO --- */
        .title-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            margin: 0 auto 30px;
        }

        .title-birthday {
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            color: #d44e6c;
            font-weight: 700;
            margin: 0 auto;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            animation: typing-fluid 3s ease-out 0.5s forwards;
            text-align: center;
            display: block;
        }

        @keyframes typing-fluid { 
            from { width: 0; } 
            to { width: 100%; } 
        }

        /* --- ESTILOS DEL PASTEL --- */
        .cake-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin: 20px 0;
            position: relative;
        }

        .cake {
            position: relative;
            width: 300px;
            height: 250px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .cake:hover {
            transform: scale(1.05);
        }

        /* Base del pastel */
        .cake-base {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: linear-gradient(145deg, #f8b3b3 0%, #f28b8b 100%);
            border-radius: 20px 20px 10px 10px;
            box-shadow: 0 10px 0 #b45b5b, 0 15px 20px rgba(0,0,0,0.2);
        }

        /* Capa media del pastel */
        .cake-middle {
            position: absolute;
            bottom: 100px;
            width: 85%;
            left: 7.5%;
            height: 80px;
            background: linear-gradient(145deg, #fad0d0 0%, #f5b3b3 100%);
            border-radius: 15px 15px 5px 5px;
            box-shadow: 0 8px 0 #b45b5b, 0 10px 15px rgba(0,0,0,0.15);
        }

        /* Capa superior del pastel */
        .cake-top {
            position: absolute;
            bottom: 160px;
            width: 70%;
            left: 15%;
            height: 60px;
            background: linear-gradient(145deg, #ffe5e5 0%, #ffcccc 100%);
            border-radius: 12px 12px 5px 5px;
            box-shadow: 0 6px 0 #b45b5b, 0 8px 12px rgba(0,0,0,0.1);
        }

        /* Cobertura de crema */
        .icing {
            position: absolute;
            top: -10px;
            width: 100%;
            height: 15px;
            background: #fff0f0;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Velas */
        .candle {
            position: absolute;
            bottom: 210px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 60px;
            background: linear-gradient(135deg, #ffd966 0%, #ffbf00 100%);
            border-radius: 5px;
            box-shadow: 0 5px 0 #b38f00, 0 8px 10px rgba(0,0,0,0.15);
            z-index: 10;
        }

        .flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 25px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 50%, #ff4500 100%);
            border-radius: 50% 50% 30% 30%;
            animation: flicker 0.5s infinite alternate;
            box-shadow: 0 0 15px #ff8c00;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }

        /* Decoraciones */
        .sprinkles {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10px 10px, #ff69b4 2px, transparent 2px),
                        radial-gradient(circle at 30px 20px, #ff1493 2px, transparent 2px),
                        radial-gradient(circle at 50px 15px, #ffb6c1 2px, transparent 2px);
            background-size: 40px 40px;
            opacity: 0.6;
            border-radius: 10px;
        }

        /* --- TEXTOS DEBAJO DEL PASTEL COMPLETAMENTE CENTRADOS --- */
        .textos-debajo-pastel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 40px auto 20px;
            padding: 0 15px;
            text-align: center;
        }

        .texto-bienvenida {
            font-size: clamp(1.3rem, 5vw, 2.2rem);
            color: #c2185b;
            font-weight: 700;
            margin: 8px 0;
            text-align: center;
            width: 100%;
            animation: fadeInUp 1.5s ease-out forwards;
            opacity: 0;
            animation-delay: 1s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .texto-felicitacion {
            font-size: clamp(1.2rem, 4.5vw, 2rem);
            color: #8b3a5c;
            font-weight: 600;
            margin: 8px 0;
            text-align: center;
            width: 100%;
            animation: fadeInUp 1.5s ease-out forwards;
            opacity: 0;
            animation-delay: 1.8s;
        }

        .texto-mensaje {
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            color: #ad4d6b;
            font-style: italic;
            margin: 8px 0;
            text-align: center;
            width: 100%;
            max-width: 800px;
            line-height: 1.6;
            animation: fadeInUp 1.5s ease-out forwards;
            opacity: 0;
            animation-delay: 2.5s;
        }

        .hint-text {
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: #c2185b;
            margin: 20px 0 5px;
            opacity: 0;
            text-align: center;
            width: 100%;
            animation: fadeIn 2s 4s forwards;
            font-weight: 500;
            background: rgba(255,255,255,0.5);
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
        }

        /* --- ANIMACIONES --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .textos-debajo-pastel {
                margin: 30px auto 15px;
                padding: 0 10px;
            }
            
            .texto-bienvenida,
            .texto-felicitacion,
            .texto-mensaje {
                margin: 5px 0;
            }
            
            .cake {
                width: 250px;
                height: 220px;
            }
        }

        @media (max-width: 480px) {
            .title-birthday {
                font-size: clamp(1.5rem, 6vw, 2rem);
            }
            
            .cake {
                width: 220px;
                height: 200px;
            }
            
            .hint-text {
                padding: 6px 15px;
            }
        }

        /* --- PARA ASEGURAR QUE TODO TEXTO ESTÉ CENTRADO --- */
        .textos-debajo-pastel p,
        .textos-debajo-pastel h1,
        .textos-debajo-pastel h2,
        .textos-debajo-pastel h3,
        .textos-debajo-pastel span {
            text-align: center !important;
            margin-left: auto !important;
            margin-right: auto !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sección del pastel -->
        <div class="cake-section">
            <!-- Contenedor del título -->
            <div class="title-container">
                <h1 class="title-birthday">¡Feliz Cumpleaños!</h1>
            </div>
            
            <!-- Contenedor del pastel -->
            <div class="cake-container">
                <div class="cake" onclick="alert('¡Sorpresa! 🎉 ¡Feliz Cumpleaños!')">
                    <!-- Base del pastel -->
                    <div class="cake-base">
                        <div class="icing"></div>
                        <div class="sprinkles"></div>
                    </div>
                    
                    <!-- Capa media -->
                    <div class="cake-middle">
                        <div class="icing"></div>
                        <div class="sprinkles"></div>
                    </div>
                    
                    <!-- Capa superior -->
                    <div class="cake-top">
                        <div class="icing"></div>
                        <div class="sprinkles"></div>
                    </div>
                    
                    <!-- Vela -->
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                </div>
            </div>
            
            <!-- TEXTOS DEBAJO DEL PASTEL - COMPLETAMENTE CENTRADOS -->
            <div class="textos-debajo-pastel">
                <p class="texto-bienvenida">¡Hoy es un día muy especial!</p>
                <h2 class="texto-felicitacion">Que todos tus sueños se hagan realidad</h2>
                <p class="texto-mensaje">Disfruta cada momento de este nuevo año de vida.<br>Te deseamos lo mejor en este día tan importante.</p>
                <span class="hint-text">✨ ¡Haz clic en el pastel para una sorpresa! ✨</span>
            </div>
        </div>
    </div>

    <!-- Pequeño script para interacción -->
    <script>
        // Animación adicional al hacer clic
        const cake = document.querySelector('.cake');
        cake.addEventListener('click', function() {
            this.style.animation = 'bounce 0.5s ease';
            setTimeout(() => {
                this.style.animation = '';
            }, 500);
        });

        // Estilo para la animación de bounce
        const style = document.createElement('style');
        style.textContent = `
            @keyframes bounce {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.1); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
