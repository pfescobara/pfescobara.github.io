<!--
Carta de cumpleaños para Gaby

Hola, Gaby.
La verdad es que no creo que estés viendo esto,
pero me gusta la idea de que estas palabras vivan escondidas
dentro de este archivo, como un pequeño secreto del corazón.

No sé cómo entraste en mi vida,
ni en qué momento tu sonrisa comenzó a acompañarme
en cada instante del día y también en la noche.
No entiendo cómo caí en esta dulce locura por tu causa,
ni en qué momento empecé a enamorarme de ti,
no por cómo te ves, sino por quién eres.

No sé cómo decirte que me gustas.
Ahora cada canción que escucho parece hablar de ti.
Te escucho en todas partes:
en el ruido del caos y en el silencio de la tranquilidad.

Y por las noches…
no solo te veo en mis sueños,
te siento.
Mi mente te dibuja con una claridad que asusta,
como si mi corazón se negara a descansar sin imaginarte.

Tu sonrisa se ha convertido en mi luz,
esa que ilumina mis pensamientos incluso en la oscuridad.
Es increíble cómo lograste ser mi delirio,
mi locura más intensa y mi calma más profunda.
Cómo te convertiste en mi martirio,
porque duele quererte en silencio,
y al mismo tiempo en mi alegría,
porque pensarte me salva el día.

En mis sueños no solo apareces,
te quedas.
Y despierto con esa sensación de haberte tenido tan cerca,
que por un momento creo que mi corazón no distingue
entre lo que imagina y lo que anhela.

La verdad es que me tienes loco,
y aún no sé cómo decirte lo que siento.
Solo espero que algún día pueda amarte,
escucharte, consolarte
y acompañarte en cualquier locura que la vida nos regale.

Cada vez que le rezo a Dios,
le pido que, si está en sus planes,
nuestros caminos puedan unirse algún día.
Pero más que nada,
le pido que se haga su voluntad en tu vida,
porque lo único que quiero, con todo mi amor,
es lo mejor para ti.

Y si en sus planes no estoy yo,
entonces solo le pido fuerzas para aceptarlo,
para entenderlo sin rencor,
y seguir deseando tu felicidad desde donde me toque estar.
Porque amarte también significa
querer verte plena, en paz y feliz,
aunque el destino no me regale el privilegio
de caminar a tu lado.

Pero pase lo que pase,
siempre te seguiré amando.
Porque cuando el amor es verdadero,
no depende de circunstancias ni de distancias.
Mi amor por ti no necesita condiciones,
solo necesita existir.
Y dondequiera que la vida me lleve,
una parte de mi corazón siempre será tuya,
porque amaré tu esencia,
hoy y siempre.

Siempre tuyo,
tu loco enamorado,
Pablo :)
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Gaby</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-dark: #6d214f;
            --white: #ffffff;
            --pink-light: #f8c8dc;
        }
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #f8c8dc, #ff9ecf);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
            position: relative;
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8c8dc;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
            transition: opacity 1s ease;
        }
        .typing-start {
            font-size: clamp(2rem, 8vw, 3rem);
            color: #6d214f;
            margin-bottom: 10px;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #6d214f;
            width: 0;
            margin: 0 auto;
            animation: typing-intro 2s steps(20) forwards, blink 0.7s infinite;
        }
        @keyframes typing-intro {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
        #main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 100%;
            position: relative;
            height: 100vh;
        }
        
        /* Contenedores de animaciones - CORREGIDO */
        #sparkles-container,
        #hearts-container,
        #confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        
        #hearts-container {
            z-index: 2;
        }
        
        #confetti-container {
            z-index: 3;
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%,100%{opacity:0;transform:scale(.5);}
            50%{opacity:.8;transform:scale(1.2);}
        }
        
        .confetti {
            position: absolute;
            width: 10px; 
            height: 10px;
            top: -20px; 
            opacity: .7;
            animation: fall linear infinite;
            z-index: 3;
        }
        
        .heart {
            position: absolute;
            font-size: clamp(14px, 4vw, 18px);
            color: #f5b5cc;
            opacity: .9;
            top: -20px;
            animation: fall linear infinite;
            z-index: 2;
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
            }
            100% { 
                transform: translateY(110vh) rotate(720deg); 
            }
        }
        
        .cake-container {
            position: relative;
            width: min(300px, 80vw);
            height: min(250px, 66vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            margin-top: 20px;
            transform: scale(1);
            transform-origin: center;
        }
        .cake-base, .cake-middle, .cake-top, .icing, .candle {
            animation: dropCake 1s cubic-bezier(0.17,0.67,0.83,0.67) forwards;
            opacity: 0;
        }
        @keyframes dropCake {
            0% { transform: translateY(-500px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .cake-base { 
            width: min(200px, 53vw); 
            height: min(100px, 26vw); 
            background: #ffb6c1; 
            border-radius: 10px; 
            position: absolute; 
            bottom: 0; 
            animation-delay: .2s; 
        }
        .cake-middle { 
            width: min(160px, 42vw); 
            height: min(80px, 21vw); 
            background: #ff9ecf; 
            border-radius: 10px; 
            position: absolute; 
            bottom: min(80px, 21vw); 
            animation-delay: .5s; 
        }
        .cake-top { 
            width: min(120px, 32vw); 
            height: min(60px, 16vw); 
            background: #ff85c1; 
            border-radius: 10px; 
            position: absolute; 
            bottom: min(140px, 37vw); 
            animation-delay: .8s; 
        }
        .icing { 
            width: min(130px, 34vw); 
            height: min(30px, 8vw); 
            background: white; 
            border-radius: 20px; 
            position: absolute; 
            bottom: min(185px, 49vw); 
            z-index: 13; 
            animation-delay: 1.1s; 
        }
        .icing::after { 
            content: ""; 
            position: absolute; 
            top: min(15px, 4vw); 
            left: min(5px, 1.3vw); 
            width: min(20px, 5vw); 
            height: min(20px, 5vw); 
            background: white; 
            border-radius: 50%; 
            box-shadow: min(25px, 6.5vw) 0 white, min(50px, 13vw) 0 white, min(75px, 19vw) 0 white, min(100px, 26vw) 0 white; 
        }
        .candle {
            width: min(12px, 3vw);
            height: min(45px, 12vw);
            background: repeating-linear-gradient(
                45deg,
                #ffffff,
                #ffffff 5px,
                #e91e63 5px,
                #e91e63 10px
            ); 
            position: absolute;
            bottom: min(210px, 56vw);
            border-radius: 3px;
            animation-delay: 1.4s;
            z-index: 14;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.1);
        }
        .flame {
            width: min(20px, 5vw); 
            height: min(35px, 9vw);
            background: radial-gradient(circle at 50% 80%, #fff 10%, #ffeb3b 40%, #ff9800 70%, #ff5722 100%);
            border-radius: 50% 50% 20% 20% / 60% 60% 40% 40%;
            position: absolute; 
            bottom: min(255px, 68vw);
            opacity: 0; 
            cursor: pointer; 
            z-index: 15;
            box-shadow: 0 0 20px rgba(255,165,0,.6);
            animation: fadeInFlame .5s 2.2s forwards, realFire .1s infinite alternate 2.7s;
        }
        @keyframes fadeInFlame { from{opacity:0;} to{opacity:1;} }
        @keyframes realFire {
            0%{transform: scale(1) rotate(-2deg);}
            100%{transform: scale(1.1) rotate(2deg);}
        }
        .title-container { 
            text-align:center; 
            margin-top: min(40px, 8vw); 
            width: 100%;
            padding: 0 10px;
            box-sizing: border-box;
            z-index: 10;
        }
        .title-birthday {
            font-size: clamp(2rem, 8vw, 3.5rem); 
            color: var(--pink-dark); 
            margin: 0;
            overflow: hidden; 
            white-space: nowrap; 
            width: 0;
            animation: typing-fluid 3s ease-out 2s forwards;
            margin: 0 auto;
        }
        @keyframes typing-fluid { from{width:0;} to{width: 100%;} }
        .hint-text {
            font-size: clamp(1rem, 4vw, 1.8rem); 
            color: #c2185b; 
            font-weight: bold;
            margin-top: 10px; 
            opacity: 0; 
            animation: fadeIn 2s 4.5s forwards;
            white-space: nowrap;
        }
        @keyframes fadeIn { to{opacity:1;} }
        .envelope-wrapper {
            position:absolute; 
            top:50%; 
            left:50%;
            transform:translate(-50%,-50%);
            display:none; 
            z-index:100;
            width: min(280px, 80vw);
        }
        .envelope {
            width: 100%; 
            height: min(180px, 45vw); 
            background:#fff;
            position:relative; 
            box-shadow:0 10px 40px rgba(0,0,0,.2);
        }
        .envelope-flap {
            position:absolute; 
            top:0; 
            z-index: 2;
            border-left: min(140px, 40vw) solid transparent; 
            border-right: min(140px, 40vw) solid transparent;
            border-top: min(90px, 25vw) solid #f8c8dc; 
            transform-origin:top; 
            transition:.5s;
        }
        .open-flap { transform: rotateX(180deg); }
        .carta {
            position:absolute; 
            bottom:5px; 
            left:5%;
            width:90%; 
            height:80%; 
            background:white;
            padding: min(20px, 4vw); 
            box-sizing: border-box;
            overflow-y:auto; 
            transition:.8s; 
            z-index: 1;
            scroll-behavior: smooth;
            border-radius: 8px;
        }
        .carta.deploy {
            position:fixed; 
            top:50%; 
            left:50%;
            transform:translate(-50%,-50%) scale(1);
            width: min(340px, 90vw);
            height: min(85vh, 80vh);
            border-radius: 8px;
            box-shadow:0 0 100px rgba(0,0,0,.5); 
            z-index: 200;
        }
        #texto { 
            font-family: 'Dancing Script', cursive; 
            font-size: clamp(1rem, 4vw, 1.2rem); 
            line-height: 1.4; 
            color: #333; 
            white-space: pre-line; 
        }
        #contenedor-foto {
            text-align: center;
            margin-top: 25px;
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
        }
        #contenedor-foto img {
            max-width: 100%; 
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 5px solid #fff;
        }
        
        /* Ajustes específicos para móviles */
        @media (max-width: 480px) {
            .cake-container {
                margin-top: 10px;
            }
            .title-container {
                margin-top: 20px;
            }
            .flame {
                bottom: min(255px, 72vw);
            }
            .candle {
                bottom: min(210px, 60vw);
            }
            .icing {
                bottom: min(185px, 53vw);
            }
            .cake-top {
                bottom: min(140px, 40vw);
            }
            .cake-middle {
                bottom: min(80px, 23vw);
            }
            
            /* Ajustes para animaciones en móvil */
            .confetti, .heart {
                animation-duration: 4s !important;
            }
        }
        
        /* Para pantallas muy pequeñas */
        @media (max-width: 320px) {
            .title-birthday {
                font-size: 1.8rem;
            }
            .hint-text {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="iniciarExperiencia()">
    <div>
        <h1 class="typing-start">Para Gaby... ✨</h1>
        <p style="font-size: clamp(1rem, 4vw, 1.2rem);">(Toca la pantalla para empezar)</p>
    </div>
</div>
<audio id="musica" src="Morat, Feid - Salir Con Vida (Official Video).mp3" loop></audio>
<div id="main-content">
    <div id="sparkles-container"></div>
    <div id="hearts-container"></div>
    <div id="confetti-container"></div>
    <div class="cake-container">
        <div class="cake-base"></div>
        <div class="cake-middle"></div>
        <div class="cake-top"></div>
        <div class="icing"></div>
        <div class="candle"></div>
        <div class="flame" onclick="abrirCarta()"></div>
    </div>
    <div class="title-container">
        <div class="title-birthday">Happy Birthday Gaby!</div>
        <div class="hint-text">(La llama de la vela guarda un secreto...)</div>
    </div>
    <div class="envelope-wrapper" id="wrapper">
        <div class="envelope">
            <div class="envelope-flap" id="flap"></div>
            <div class="carta" id="carta" onclick="cerrarCarta(event)">
                <h3 style="color:#c2185b;text-align:center; margin-top:0;">Para ti, Gaby 💖</h3>
                <div id="texto"></div>
                <div id="contenedor-foto">
                    <img src="imagenCartaGaby.png" alt="Para Gaby">
                </div>
                <p style="text-align:center; font-size:0.9rem; color:#888; margin-top:30px;">(Haz clic para cerrar)</p>
            </div>
        </div>
    </div>
</div>
<script>
const mensaje = `Hola, Gaby.
Quería desearte un muy feliz cumpleaños. Eres una persona increíble y espero que este pequeño detalle te haga sonreír. 
De verdad espero que este año te traiga cosas increíbles, que cumplas metas, que rías muchísimo y que nunca pierdas esa luz tan tuya que hace que todo se sienta más bonito. Que cada día encuentres motivos nuevos para sonreír y sentirte orgullosa de quién eres. 
Gracias por ser como eres aunque no sé cómo lo haces, pero siempre logras alegrarme el día. Tienes una forma muy especial de estar en la vida, y eso es algo que vale muchísimo. 
Disfruta cada momento, celebra a lo grande y guarda recuerdos que te hagan sonreír incluso dentro de muchos años. 
Con mucho cariño, Pablo :) `;
let yaSeEscribio = false;
function iniciarExperiencia() {
    const musica = document.getElementById("musica");
    const overlay = document.getElementById("overlay");
    const mainContent = document.getElementById("main-content");
    musica.volume = 0.4;
    musica.play().catch(error => console.log("Error al reproducir:", error));
    overlay.style.opacity = "0";
    setTimeout(() => {
        overlay.style.display = "none";
        mainContent.style.display = "flex";
        createSparkles();
        createConfetti();
        setTimeout(createHearts, 3000);
    }, 1000);
}
function abrirCarta() {
    const wrapper = document.getElementById("wrapper");
    const flap = document.getElementById("flap");
    const carta = document.getElementById("carta");
    const divTexto = document.getElementById("texto");
    const foto = document.getElementById("contenedor-foto");
    wrapper.style.display = "block";
    setTimeout(() => {
        flap.classList.add("open-flap");
        setTimeout(() => {
            carta.classList.add("deploy");
            if (!yaSeEscribio) {
                escribirTexto();
            } else {
                divTexto.innerHTML = mensaje;
                foto.style.display = "block";
                foto.style.opacity = "1";
                carta.scrollTop = 0;
            }
        }, 600);
    }, 100);
}
function cerrarCarta(e) {
    e.stopPropagation();
    const carta = document.getElementById("carta");
    const flap = document.getElementById("flap");
    const wrapper = document.getElementById("wrapper");
    carta.classList.remove("deploy");
    setTimeout(() => {
        flap.classList.remove("open-flap");
        setTimeout(() => {
            wrapper.style.display = "none";
        }, 500);
    }, 600);
}
let j = 0;
function escribirTexto() {
    const divTexto = document.getElementById("texto");
    const cartaContenedor = document.getElementById("carta");
    if (j < mensaje.length) {
        divTexto.innerHTML += mensaje.charAt(j);
        j++;
        cartaContenedor.scrollTop = cartaContenedor.scrollHeight;
        let speed = 25;
        if(mensaje.charAt(j-1) === "." || mensaje.charAt(j-1) === ",") speed = 150;
        setTimeout(escribirTexto, speed);
    } else {
        yaSeEscribio = true;
        const foto = document.getElementById("contenedor-foto");
        foto.style.display = "block";
        setTimeout(() => {
            foto.style.opacity = "1";
            setTimeout(() => {
                cartaContenedor.scrollTop = cartaContenedor.scrollHeight;
            }, 500);
        }, 100);
    }
}
function createSparkles(){
    const container = document.getElementById('sparkles-container');
    container.innerHTML = ''; // Limpiar existentes
    for(let i=0;i<40;i++){
        const s=document.createElement('div');
        s.className='sparkle';
        let size=Math.random()*4+2;
        s.style.width=size+'px'; 
        s.style.height=size+'px';
        s.style.left=Math.random()*100+'%'; // Cambiado a % para mejor responsividad
        s.style.top=Math.random()*100+'%';
        s.style.setProperty('--duration',(Math.random()*3+2)+'s');
        s.style.animationDelay=Math.random()*5+'s';
        container.appendChild(s);
    }
}
function createConfetti(){
    const container = document.getElementById('confetti-container');
    container.innerHTML = ''; // Limpiar existentes
    const colors=['#ff69b4','#ff1493','#ffffff','#ffd700','#ff85c1']; 
    for(let i=0;i<60;i++){
        const d=document.createElement('div');
        d.className='confetti';
        d.style.left=Math.random()*100+'%'; // Cambiado a % para mejor responsividad
        d.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
        d.style.animationDuration=(Math.random()*3+2)+'s';
        d.style.animationDelay=Math.random()*2+'s'; // Añadido delay aleatorio
        container.appendChild(d);
    }
}
function createHearts(){
    const container = document.getElementById('hearts-container');
    container.innerHTML = ''; // Limpiar existentes
    for(let i=0;i<8;i++){
        const h=document.createElement('div');
        h.className='heart';
        h.innerHTML="❤";
        h.style.left=Math.random()*100+'%'; // Cambiado a % para mejor responsividad
        h.style.animationDuration=(Math.random()*6+6)+'s';
        h.style.animationDelay=Math.random()*3+'s';
        container.appendChild(h);
    }
}

// Prevenir scroll cuando la carta está abierta
document.addEventListener('touchmove', function(e) {
    const carta = document.getElementById('carta');
    if (carta.classList.contains('deploy')) {
        e.preventDefault();
    }
}, { passive: false });
</script>
</body>
</html>
